name: Daily YouTube Transcript

on:
  schedule:
    # 20:30 UTC = 21:30 Oslo (winter) / 22:30 Oslo (summer).
    # Adjust if you want a later slot (YouTube auto-captions need time to appear).
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      channel_url:
        description: "YouTube channel URL (e.g. https://www.youtube.com/@smokescreen8732). Leave blank to use repo variable or script default."
        required: false
        type: string
      max_videos:
        description: "Max recent videos to scan."
        required: false
        type: string
      languages:
        description: "Comma-separated transcript language codes, in preference order (e.g. bg,en)."
        required: false
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/python/requirements.txt

      - name: Install dependencies
        run: pip install -r src/python/requirements.txt

      - name: Run bot
        env:
          CHANNEL_URL: ${{ inputs.channel_url || vars.CHANNEL_URL }}
          MAX_VIDEOS:  ${{ inputs.max_videos  || vars.MAX_VIDEOS }}
          LANGUAGES:   ${{ inputs.languages   || vars.LANGUAGES }}
        run: python src/python/youtube_transcript_bot.py

      - name: Commit outputs
        run: |
          git config user.name  "transcript-bot"
          git config user.email "bot@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No new transcripts."
          else
            git commit -m "Daily transcripts: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transcripts-${{ github.run_id }}
          path: outputs/
          if-no-files-found: ignore
